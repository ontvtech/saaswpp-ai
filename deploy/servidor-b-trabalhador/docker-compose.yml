version: '3.8'

services:
  # Evolution API (O coração do WhatsApp)
  evolution:
    image: atendare/evolution-api:latest
    container_name: saaswpp_evolution
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=GATEWAY
      - CORE_URL=http://192.168.88.5:3000 # IP do Servidor A
      - API_KEY=${EVOLUTION_API_KEY}
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: always

  # Redis para Cache e Filas de Mensagens
  redis:
    image: redis:7-alpine
    container_name: saaswpp_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    restart: always
