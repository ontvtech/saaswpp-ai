version: '3.8'

services:
  # O Cérebro do SaaS (Node.js + Vite)
  app:
    image: node:20-alpine
    container_name: saaswpp_app
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_HOST=192.168.88.6 # IP do Servidor B
      - EVOLUTION_API_URL=http://192.168.88.6:8080
    volumes:
      - .:/app
    restart: always

  # Banco de Dados Central
  db:
    image: postgres:15-alpine
    container_name: saaswpp_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - saaswpp_postgres_data:/var/lib/postgresql/data
    restart: always

  # n8n para Automações Complexas
  n8n:
    image: n8nio/n8n:latest
    container_name: saaswpp_n8n
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    ports:
      - "5678:5678"
    restart: always

volumes:
  saaswpp_postgres_data:
