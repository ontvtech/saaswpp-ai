# =============================================================================
# DOCKER COMPOSE - SaaSWPP AI
# Arquitetura: 2 Servidores (8GB + 16GB)
# Plataforma: Coolify
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # SERVIÇO PRINCIPAL - API + FRONTEND
  # Roda no servidor de 16GB (mais recursos)
  # ===========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saaswpp-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - ADMIN_WHATSAPP=${ADMIN_WHATSAPP}
    depends_on:
      - redis
    networks:
      - saaswpp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "coolify.managed=true"
      - "coolify.appId=${COOLIFY_APP_ID}"

  # ===========================================================================
  # REDIS - Cache e Filas
  # Roda no servidor de 16GB (junto com a app)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: saaswpp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    networks:
      - saaswpp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # WORKER - Processamento de Filas (BullMQ)
  # Roda no servidor de 16GB
  # ===========================================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: saaswpp-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
    depends_on:
      - redis
    networks:
      - saaswpp-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  redis_data:
    driver: local

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  saaswpp-network:
    driver: bridge
